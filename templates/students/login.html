<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>

    <form action="" method="post">
        
        {% csrf_token %}
        <label for="">Name</label>
        <input type="text" name="name">
        {{ form.name.errors }}
        <label for="">Email</label>
        <input type="Email" name="email">
        {{ form.email.errors }}
        {% if error%}
        {{ error }}
        {% endif %}
        <button>Login</button>
    </form>
    <a href="{% url 'students:home' %}" class=""><p>< -- back</p></a>
</body>
</html>
