<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Portal{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-alt: #eef3fa;
            --ink: #132238;
            --muted: #5b6b7f;
            --line: #d9e3f0;
            --primary: #0f766e;
            --primary-strong: #0b5d57;
            --accent: #f97316;
            --success: #166534;
            --danger: #b91c1c;
            --shadow: 0 14px 34px rgba(16, 24, 40, 0.12);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 8%, rgba(15, 118, 110, 0.14), transparent 35%),
                radial-gradient(circle at 92% 24%, rgba(249, 115, 22, 0.14), transparent 35%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 40;
            backdrop-filter: blur(8px);
            background: rgba(248, 251, 255, 0.86);
            border-bottom: 1px solid var(--line);
        }

        .topbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            font-weight: 700;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .brand-mark {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }

        .menu-btn {
            display: none;
            border: 1px solid var(--line);
            background: var(--surface);
            border-radius: 10px;
            padding: 8px 12px;
            font: inherit;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link {
            font-size: 0.95rem;
            color: var(--muted);
            padding: 8px 12px;
            border-radius: 10px;
            transition: 0.2s ease;
        }

        .nav-link:hover {
            color: var(--ink);
            background: var(--surface-alt);
        }

        .container {
            width: min(1100px, calc(100% - 32px));
            margin: 28px auto 24px;
            flex: 1;
        }

        .panel {
            background: var(--surface);
            border: 1px solid rgba(217, 227, 240, 0.9);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .btn {
            border: 0;
            border-radius: 12px;
            padding: 11px 16px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(120deg, var(--primary) 0%, var(--primary-strong) 100%);
            box-shadow: 0 12px 26px rgba(15, 118, 110, 0.28);
        }

        .btn-primary:hover {
            opacity: 0.94;
        }

        .btn-ghost {
            color: var(--ink);
            border: 1px solid var(--line);
            background: #fff;
        }

        .btn-ghost:hover {
            background: var(--surface-alt);
        }

        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: inline-block;
            margin-bottom: 7px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .field input {
            width: 100%;
            padding: 12px 13px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #fbfdff;
            font: inherit;
            outline: none;
            transition: border-color 0.16s ease, box-shadow 0.16s ease;
        }

        .field input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        }

        .errorlist {
            margin: 7px 0 0;
            padding: 0;
            list-style: none;
            color: var(--danger);
            font-size: 0.9rem;
        }

        .alert {
            margin: 12px 0;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .alert-danger {
            color: #7f1d1d;
            border: 1px solid #fecaca;
            background: #fef2f2;
        }

        .muted {
            color: var(--muted);
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .reveal.show {
            opacity: 1;
            transform: translateY(0);
        }

        footer {
            max-width: 1100px;
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto 22px;
            color: var(--muted);
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 780px) {
            .menu-btn {
                display: inline-flex;
            }

            .nav-links {
                position: absolute;
                right: 16px;
                top: 60px;
                display: none;
                min-width: 190px;
                padding: 10px;
                border: 1px solid var(--line);
                border-radius: 12px;
                background: #fff;
                box-shadow: var(--shadow);
                flex-direction: column;
                align-items: stretch;
            }

            .nav-links.open {
                display: flex;
            }

            .nav-link {
                width: 100%;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a href="{% url 'students:home' %}" class="brand">
                <span class="brand-mark"></span>
                <span>Student Portal</span>
            </a>
            <button class="menu-btn" type="button" id="menuToggle">Menu</button>
            <nav class="nav-links" id="topNav">
                <a href="{% url 'students:home' %}" class="nav-link">Home</a>
                {% if request.session.email %}
                <a href="{% url 'students:courses' %}" class="nav-link">Courses</a>
                <a href="{% url 'students:logout' %}" class="nav-link">Logout</a>
                {% else %}
                <a href="{% url 'students:register' %}" class="nav-link">Register</a>
                <a href="{% url 'students:login' %}" class="nav-link">Login</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        Built for course registration workflow.
    </footer>

    <script>
        (function () {
            var menuToggle = document.getElementById("menuToggle");
            var topNav = document.getElementById("topNav");
            if (menuToggle && topNav) {
                menuToggle.addEventListener("click", function () {
                    topNav.classList.toggle("open");
                });
            }

            var revealElements = document.querySelectorAll(".reveal");
            if (!("IntersectionObserver" in window)) {
                revealElements.forEach(function (el) { el.classList.add("show"); });
                return;
            }

            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("show");
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            revealElements.forEach(function (el) { observer.observe(el); });
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
